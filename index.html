<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse Study - Medical Flashcards</title>
    <meta name="description"
        content="Study medical flashcards dynamically on Synapse Study. Master Immunology, Pathology, Surgery, Physiology, and more.">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- KaTeX for Medical/Math Formulas -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar / Header -->
        <header class="app-header">
            <div class="logo-container">
                <div class="logo-wrapper">
                    <img src="logo.jpg" alt="Synapse Study Logo" class="app-logo">
                </div>
                <h1 class="logo-text"><span>SYNAPSE</span> STUDY</h1>
            </div>
            <div class="controls-container">
                <label for="categoryFilter" class="form-label visually-hidden">Filter by Category</label>
                <select id="categoryFilter" class="form-select category-select">
                    <option value="All">All Categories</option>
                    <!-- Options populated dynamically -->
                </select>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="main-content">
            <div id="flashcard-container" class="flashcard-container">
                <div id="flashcard" class="flashcard">
                    <div class="flashcard-inner">
                        <div class="flashcard-front">
                            <span class="card-category" id="front-category">Category</span>
                            <h2 class="card-text" id="front-text">Question goes here...</h2>
                            <p class="click-hint">Click to reveal answer</p>
                        </div>
                        <div class="flashcard-back">
                            <span class="card-category" id="back-category">Category</span>
                            <h2 class="card-text" id="back-text">Answer goes here...</h2>
                            <p class="click-hint">Click to flip back</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="navigation-controls">
                <button id="prevBtn" class="btn btn-nav btn-outline-cyan">&leftarrow; Previous</button>
                <div class="card-counter">
                    Card <span id="currentIndex">0</span> of <span id="totalCards">0</span>
                </div>
                <button id="nextBtn" class="btn btn-nav btn-cyan">Next &rightarrow;</button>
            </div>
        </main>
    </div>

    <!-- Bootstrap JS Bundle-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js?v=3"></script>
</body>

</html>
